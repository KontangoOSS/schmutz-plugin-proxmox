---
# Base role defaults
base_packages:
  - curl
  - wget
  - vim
  - htop
  - net-tools
  - dnsutils
  - ca-certificates
  - gnupg
  - unzip
  - jq

base_timezone: UTC
base_locale: en_US.UTF-8

# NTP
base_ntp_enabled: true
base_ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

# Sysctl tuning
base_sysctl:
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1
  vm.swappiness: 10
  fs.file-max: 2097152
  net.core.somaxconn: 65535

# DNS
base_dns_servers: []
base_dns_search: []
