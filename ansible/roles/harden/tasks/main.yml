---
- name: Configure SSH
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0600"
    validate: "sshd -t -f %s"
  notify: restart sshd

- name: Kernel hardening via sysctl
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    reload: yes
  loop: "{{ harden_sysctl | dict2items }}"

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  when: harden_firewall_enabled and ansible_os_family == "Debian"

- name: Set UFW defaults
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: "{{ harden_firewall_default_incoming }}" }
    - { direction: outgoing, policy: "{{ harden_firewall_default_outgoing }}" }
  when: harden_firewall_enabled

- name: Allow TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ harden_firewall_allowed_tcp }}"
  when: harden_firewall_enabled

- name: Allow UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ harden_firewall_allowed_udp }}"
  when: harden_firewall_enabled

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: harden_firewall_enabled

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  when: harden_fail2ban_enabled and ansible_os_family == "Debian"

- name: Configure fail2ban
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban
  when: harden_fail2ban_enabled

- name: Enable fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: yes
  when: harden_fail2ban_enabled

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  when: harden_auto_updates and ansible_os_family == "Debian"

- name: Enable automatic security updates
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
  when: harden_auto_updates and ansible_os_family == "Debian"
