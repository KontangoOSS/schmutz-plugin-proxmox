---
- name: Create node_exporter user
  ansible.builtin.user:
    name: "{{ monitoring_node_exporter_user }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
  when: monitoring_node_exporter

- name: Download node_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ monitoring_node_exporter_version }}/node_exporter-{{ monitoring_node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"
  when: monitoring_node_exporter

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /usr/local/bin/
    remote_src: yes
    extra_opts: [--strip-components=1, --wildcards, "*/node_exporter"]
  when: monitoring_node_exporter

- name: Install node_exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: restart node_exporter
  when: monitoring_node_exporter

- name: Enable node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes
  when: monitoring_node_exporter

- name: Download promtail
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ monitoring_promtail_version }}/promtail-linux-amd64.zip"
    dest: /tmp/promtail.zip
    mode: "0644"
  when: monitoring_promtail

- name: Extract promtail
  ansible.builtin.unarchive:
    src: /tmp/promtail.zip
    dest: /usr/local/bin/
    remote_src: yes
  when: monitoring_promtail

- name: Configure promtail
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail.yml
    mode: "0644"
  notify: restart promtail
  when: monitoring_promtail

- name: Install promtail systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  when: monitoring_promtail

- name: Enable promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: yes
    daemon_reload: yes
  when: monitoring_promtail
