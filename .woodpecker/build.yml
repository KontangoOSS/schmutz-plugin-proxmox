# =============================================================================
# Build & publish the plugin image with Woodpecker CI
# =============================================================================
# Builds this repo's Dockerfile and pushes it to a container registry on
# pushes to main and on tags. Point REGISTRY/IMAGE at your own registry.
#
# ── Secrets to configure in Woodpecker (Repo → Settings → Secrets) ────────
#   REGISTRY_USER       registry username
#   REGISTRY_PASSWORD   registry password / token
# =============================================================================

when:
  - event: push
    branch: [main]
  - event: tag

steps:
  - name: build-and-push
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REGISTRY_USER:
        from_secret: REGISTRY_USER
      REGISTRY_PASSWORD:
        from_secret: REGISTRY_PASSWORD
    commands:
      - set -e
      # Set these to your registry / image path.
      - REGISTRY="ghcr.io"
      - IMAGE="$REGISTRY/kontangooss/proxmox"
      - SHORT_SHA="${CI_COMMIT_SHA:0:8}"

      - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

      - docker build -t "$IMAGE:latest" -t "$IMAGE:$SHORT_SHA" .
      - docker push "$IMAGE:latest"
      - docker push "$IMAGE:$SHORT_SHA"
      - |
        if [ -n "$CI_COMMIT_TAG" ]; then
          docker tag "$IMAGE:latest" "$IMAGE:$CI_COMMIT_TAG"
          docker push "$IMAGE:$CI_COMMIT_TAG"
        fi
      - echo "Pushed $IMAGE:latest and $IMAGE:$SHORT_SHA"
